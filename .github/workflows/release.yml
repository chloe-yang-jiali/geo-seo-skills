name: Release Skill Package

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Package skill files
        run: |
          cd topic-map-generator
          zip -r ../topic-map-generator.zip SKILL.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: topic-map-generator.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}